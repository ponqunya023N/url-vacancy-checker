name: Cleanup Old Workflow Runs (Fixed)

on:
  schedule:
    # 日本時間 01:00 (UTC 16:00) および 07:00 (UTC 22:00)
    - cron: '0 16,22 * * *'
  workflow_dispatch:

env:
  # 日本時間での指定
  RETENTION_PERIOD: "1 hour ago"

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Delete old workflow runs
        run: |
          # 1. 日本時間で基準時刻を計算し、UTC形式に変換
          DEL_BEFORE_UTC=$(TZ="Asia/Tokyo" date -d "${{ env.RETENTION_PERIOD }}" -u +"%Y-%m-%dT%H:%M:%SZ")
          
          echo "Retention Setting: ${{ env.RETENTION_PERIOD }}"
          echo "Target UTC: $DEL_BEFORE_UTC"

          # 2. 条件に合う実行履歴のIDを取得して削除
          # gh run list で条件に合うIDのみを抽出し、xargs で削除コマンドに渡す
          # --created: 指定時刻より前
          # --limit: 一回で処理する最大件数（多すぎる場合のタイムアウト防止）
          gh run list --repo ${{ github.repository }} \
            --created "<$DEL_BEFORE_UTC" \
            --limit 500 \
            --json databaseId \
            --jq '.[].databaseId' | \
            xargs -I{} gh run delete {} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}
